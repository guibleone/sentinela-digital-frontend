name: CI Build and Test

on:
  workflow_dispatch: 
  push:
    branches-ignore:
      - 'main'
  pull_request:
    branches-ignore:
      - 'main'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar ambiente
        # Exemplo para Node.js, ajuste conforme sua linguagem
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependências
        run: npm install

      - name: Rodar Build
        run: npm run build

      - name: Rodar Testes
        run: npm test
