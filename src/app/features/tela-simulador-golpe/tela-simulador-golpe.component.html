<section>
  <div class="titulo">
    <h3>Simulador de Golpes</h3>
    <h1>Aprenda a se <u><strong>proteger</strong></u></h1>
  </div>
  <div class="questoes">
    <p>Questão <strong>{{ index + 1 }} / {{ perguntas.length }}</strong></p>
  </div>
  <div class="questao">
    <p>
      {{ perguntaAtual.texto }}
    </p>
  </div>
  <div class="acoes-resposta">
    <button (click)="responder(false)" [disabled]="respostas[index] !== null">SEGURO</button>
    <button (click)="responder(true)" [disabled]="respostas[index] !== null">GOLPE</button>
  </div>
  <div class="feedback" *ngIf="respostas[index] !== null">
    <p *ngIf="respostas[index] === perguntaAtual.corretoEhGolpe" class="certo">Correto!</p>
    <p *ngIf="respostas[index] !== perguntaAtual.corretoEhGolpe" class="errado">Errado.</p>
  </div>
  <div class="resultado" *ngIf="terminou()">
    <h2>Fim do simulador</h2>
    <p>Sua pontuação: <strong>{{ pontuacao }} / {{ perguntas.length }}</strong></p>
    <button (click)="reiniciar()">Reiniciar</button>
  </div>
  <div class="navegacao">
    <a (click)="anterior()" class="link">Anterior</a>
    <a (click)="proximo()" class="link">Próximo</a>
  </div>
</section>
